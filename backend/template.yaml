AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: StrengthPilot backend — Cognito, DynamoDB, and Python Lambdas for adaptive workout generation

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  OpenAIExerciseModel:
    Type: String
    Default: gpt-4o-mini
  ExerciseAdminEmails:
    Type: String
    Default: ''

Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 512
    Architectures: [arm64]
    Layers:
      - !Ref CommonLayer
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        WORKOUTS_TABLE: !Ref WorkoutsTable
        GYMS_TABLE: !Ref GymsTable
        EXERCISES_TABLE: !Ref ExercisesTable
        STAGE: !Ref Stage

Resources:
  # ---- Shared layer ----
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub strength-pilot-${Stage}-common
      Description: Shared services, models, utils, and domain logic for StrengthPilot lambdas
      ContentUri: layers/common
      CompatibleRuntimes: [python3.11]
      CompatibleArchitectures: [arm64]
      RetentionPolicy: Delete

  # ---- Cognito ----
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub strength-pilot-${Stage}-users
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpTrigger.Arn
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: false
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub strength-pilot-${Stage}-mobile
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  PreSignUpTrigger:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub strength-pilot-${Stage}-preSignUp
      CodeUri: src/auth
      Handler: pre_sign_up.lambda_handler
      MemorySize: 256
      Policies:
        - AWSLambdaBasicExecutionRole

  PreSignUpTriggerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PreSignUpTrigger
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ---- DynamoDB ----
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub strength-pilot-${Stage}-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  WorkoutsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub strength-pilot-${Stage}-workouts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: workoutId
          AttributeType: S
        - AttributeName: completedAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: workoutId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CompletedAtIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: completedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  GymsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub strength-pilot-${Stage}-gyms
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: gymId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: gymId
          KeyType: RANGE

  ExercisesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub strength-pilot-${Stage}-exercises
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: exerciseId
          AttributeType: S
      KeySchema:
        - AttributeName: exerciseId
          KeyType: HASH

  # ---- HTTP API with Cognito JWT authorizer ----
  StrengthPilotApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              audience:
                - !Ref UserPoolClient
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowHeaders: ['Authorization', 'Content-Type']
        AllowMethods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']

  # ---- Lambdas (YAML anchors for DRY config) ----
  GeneralFunction: &GeneralFunction
    Type: AWS::Serverless::Function
    Properties: &GeneralProperties
      Handler: app.lambda_handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AmazonCognitoPowerUser
        - AWSLambdaBasicExecutionRole

  # ---- Workout domain ----
  GenerateWorkout:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-generateWorkout
      CodeUri: src/workout
      Handler: generate_workout.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /workouts/generate
            Method: post

  GenerateGuestWorkout:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-generateGuestWorkout
      CodeUri: src/workout
      Handler: generate_guest_workout.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /guest/workouts/generate
            Method: post
            Auth:
              Authorizer: NONE

  SwapExercise:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-swapExercise
      CodeUri: src/workout
      Handler: swap_exercise.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /workouts/swap
            Method: post

  LogSet:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-logSet
      CodeUri: src/workout
      Handler: log_set.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /workouts/{workoutId}/sets
            Method: post

  ListWorkouts:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-listWorkouts
      CodeUri: src/workout
      Handler: list_workouts.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /workouts
            Method: get

  # ---- Exercise library domain ----
  ListExercises:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-listExercises
      CodeUri: src/exercise
      Handler: list_exercises.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /exercises
            Method: get
            Auth:
              Authorizer: NONE

  GetExercise:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-getExercise
      CodeUri: src/exercise
      Handler: get_exercise.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /exercises/{exerciseId}
            Method: get
            Auth:
              Authorizer: NONE

  DeleteExercise:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-deleteExercise
      CodeUri: src/exercise
      Handler: delete_exercise.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /exercises/{exerciseId}
            Method: delete
            Auth:
              Authorizer: NONE

  AddExercise:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-addExercise
      CodeUri: src/exercise
      Handler: add_exercise.lambda_handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AmazonCognitoPowerUser
        - AWSLambdaBasicExecutionRole
        - Statement:
            Effect: Allow
            Action:
              - ssm:GetParameter
            Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pilot-iq/openai_api_key
      Environment:
        Variables:
          OPENAI_EXERCISE_MODEL: !Ref OpenAIExerciseModel
          EXERCISE_ADMIN_EMAILS: !Ref ExerciseAdminEmails
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /exercises
            Method: post
            Auth:
              Authorizer: NONE

  # ---- User domain ----
  GetUserProfile:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-getUserProfile
      CodeUri: src/user
      Handler: get_user_profile.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /me
            Method: get

  UpdateUserProfile:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-updateUserProfile
      CodeUri: src/user
      Handler: update_user_profile.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /me
            Method: put

  # ---- Gym domain ----
  GetGym:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-getGym
      CodeUri: src/gym
      Handler: get_gym.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /gyms/{gymId}
            Method: get

  UpdateGym:
    <<: *GeneralFunction
    Properties:
      <<: *GeneralProperties
      FunctionName: !Sub strength-pilot-${Stage}-updateGym
      CodeUri: src/gym
      Handler: update_gym.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref StrengthPilotApi
            Path: /gyms/{gymId}
            Method: put

Outputs:
  ApiEndpoint:
    Description: StrengthPilot HTTP API base URL
    Value: !Sub https://${StrengthPilotApi}.execute-api.${AWS::Region}.amazonaws.com
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID (mobile app)
    Value: !Ref UserPoolClient
  ExercisesTableName:
    Description: Canonical exercises DynamoDB table name
    Value: !Ref ExercisesTable
